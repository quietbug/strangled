<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: monospace;
    background: #000;
    color: #fff;
}

@media (pointer: fine) {
  .bg {
      pointer-events: none;
  	  position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center;
      transform: scale(1.1);
      filter: blur(40px) brightness(0.4);
      z-index: -1;
    }
}

/* no blur for mobile */
@media (pointer: coarse) {
  .bg {
	  pointer-events: none;
	  position: fixed;
	  background-image: none !important;
	  background-color: black;
  }
}

/* center everything */
main {
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* hide checkbox */
#zoom {
    display: none;
}

.viewport {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

:root {
    --sbw: 0px;
}

#zoom:checked ~ .viewport {
    overflow: auto;
    display: block;
    width: calc(100vw + var(--sbw));
    height: 100vh;
}

#zoom:checked ~ .viewport img {
    max-width: none;
    max-height: none;
    cursor: zoom-out;
}

/* image default = fit screen */
img {
    max-width: 100vw;
    max-height: 100vh;
    object-fit: contain;
    cursor: zoom-in;
}

/* controls */
nav {
    position: fixed;
    bottom: 10px;
    display: flex;

    align-items: center;

    padding: 4px 6px;
}

nav a {
    color: #ff0202;
    text-decoration: underline;
}

details {
    position: relative;
}

summary {
    cursor: pointer;
    color: #aa1010;
    text-decoration: underline;
}

.pages {
    position: absolute;
    bottom: 100%;
    left: 0;
    background: #000;
    border: 1px solid #333;
    max-height: 200px;
    overflow-y: auto;
    padding: 4px;

}

.pages a {
    display: block;
    color: #ff0202;
    text-decoration: none;
    font-size: 9pt;
}

.pages a:hover {
    background: #00cccf;
}

.pages::-webkit-scrollbar {
    width: 12px;
}

.pages::-webkit-scrollbar-track {
    background: #000;
}

.pages::-webkit-scrollbar-thumb {
    background: #000;
    border: 1px solid #fff;
}

@supports (scrollbar-width: thin) and (not selector(::-webkit-scrollbar)) {
    .pages {
        scrollbar-color: #fff #000;
    }
}

/* hide scrollbars only inside image viewport */
.viewport {
    scrollbar-width: none; /* firefox */
}

.viewport::-webkit-scrollbar {
    display: none; /* chrome/safari */
}

/* helper box */
.help {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.5);
    color: #fff;
    border: 1px solid rgba(200,0,0,0.6);
    font-family: monospace;
    font-size: small;
    padding: 6px 8px;
    opacity: 0.85;
    transition: opacity 0.2s ease;
    pointer-events: auto;
	z-index: 20;
}

.help a {
	color: #ee0000;
	text-decoration: underline;
}

.help a:hover {
	color: #00cccf;
	text-decoration: underline;
}

.help:hover {

main:has(#zoom:checked) .help {
    opacity: 0;
	pointer-events: none;

/* tighter formatting */
.help-inner {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.help .title {
    text-transform: lowercase;

/* fade out helper when zoom is active */
#zoom:checked ~ main .help {

<div class="help" id="help">
  <div class="help-inner">
    <a href="../index.html">Back to index</a>
    <div class="title">one handed mode ;)</div>
    <div><b>f</b> toggle zoom</div>
    <div><b>a</b> prev page</div>
    <div><b>d</b> next page</div>
    <div><b>w</b> pan (up)</div>
    <div><b>s</b> pan (down)</div>
    <div class="title">for hackers:</div>
    <div><b>h j k l</b> also pan</div>
  </div>
</div>

</main>

<script>

(function () {

    const zoom = document.getElementById("zoom");
    const viewport = document.getElementById("viewport");

    const SCROLL_STEP = 80;

    const prev = true;
    const next = true;

    function goPrev() {
        if (prev) {
            location.href = "page_0.html";
        }
    }

    function goNext() {
        if (next) {
            location.href = "page_2.html";
        }
    }

    function syncZoomFocus() {
        if (zoom.checked) {
            viewport.focus({ preventScroll: true });
        }
    }

    zoom.addEventListener("change", syncZoomFocus);

    viewport.addEventListener("click", () => {
        if (zoom.checked) {
            viewport.focus({ preventScroll: true });
        }
    });

    document.addEventListener("keydown", function (e) {

        const k = e.key.toLowerCase();

        if (k === "f") {
            e.preventDefault();
            zoom.checked = !zoom.checked;
            syncZoomFocus();
        }

        else if (k === "a") {
            e.preventDefault();
            goPrev();
        }

        else if (k === "d") {
            e.preventDefault();
            goNext();
        }

        else if (k === "h") {
            e.preventDefault();
            viewport.scrollBy(-SCROLL_STEP, 0);
        }

        else if (k === "j" || k === "s") {
            e.preventDefault();
            viewport.scrollBy(0, SCROLL_STEP);
        }

        else if (k === "k" || k === "w") {
            e.preventDefault();
            viewport.scrollBy(0, -SCROLL_STEP);
        }

        else if (k === "l") {
            e.preventDefault();
            viewport.scrollBy(SCROLL_STEP, 0);
        }

    });

})();

</script>
